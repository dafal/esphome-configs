substitutions:
  device_name: athom-ps02c3mz-sensor
  friendly_name: PS02C3MZ Sensor
  project_name: dafal_esphome-configs.athom_ps02c3mz_sensor
  project_version: 1.0.0
  area: ""

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${project_version}
  area: ${area}
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 1s
      - script.execute: restore_ble_mode

esp32:
  board: esp32-c3-devkitm-1
  flash_size: 4MB
  variant: esp32c3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y

preferences:
  flash_write_interval: 5min

globals:
  - id: learning_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: learning_has_samples
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: learning_zone
    type: int
    restore_value: true
    initial_value: '1'
  - id: learning_sample_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: learning_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: learned_min_x
    type: float
    restore_value: false
    initial_value: '0'
  - id: learned_max_x
    type: float
    restore_value: false
    initial_value: '0'
  - id: learned_min_y
    type: float
    restore_value: false
    initial_value: '0'
  - id: learned_max_y
    type: float
    restore_value: false
    initial_value: '0'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "esphome"
    password: !secret fallback_password
  on_connect:
    - logger.log: "WiFi connected"
  on_disconnect:
    - logger.log: "WiFi disconnected"

captive_portal:

mdns:
  disabled: false

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 3
  log: true

logger:
  level: DEBUG
  baud_rate: 115200

status_led:
  pin:
    number: GPIO2
    inverted: true

esp32_ble_tracker:
  id: ble_tracker
  scan_parameters:
    continuous: false
    active: false

bluetooth_proxy:
  active: true

esp32_improv:
  authorizer: none

i2c:
  sda: GPIO18
  scl: GPIO19
  scan: true

uart:
  id: uart_ld2450
  tx_pin: GPIO8
  rx_pin: GPIO5
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

interval:
  - interval: 250ms
    then:
      - lambda: |-
          if (!id(learning_active)) {
            return;
          }

          const uint32_t now = millis();
          const float duration_s = id(learning_duration_s).state;
          if (!isnan(duration_s) && duration_s > 0.0f) {
            const uint32_t duration_ms = static_cast<uint32_t>(duration_s * 1000.0f);
            if (now - id(learning_started_ms) >= duration_ms) {
              id(learning_active) = false;
              ESP_LOGI("learn", "Learning capture finished with %d samples", id(learning_sample_count));
              return;
            }
          }

          auto capture_target = [&](float x, float y, float distance) {
            if (isnan(x) || isnan(y) || isnan(distance) || distance <= 0.0f) {
              return;
            }

            if (!id(learning_has_samples)) {
              id(learned_min_x) = x;
              id(learned_max_x) = x;
              id(learned_min_y) = y;
              id(learned_max_y) = y;
              id(learning_has_samples) = true;
            } else {
              if (x < id(learned_min_x)) id(learned_min_x) = x;
              if (x > id(learned_max_x)) id(learned_max_x) = x;
              if (y < id(learned_min_y)) id(learned_min_y) = y;
              if (y > id(learned_max_y)) id(learned_max_y) = y;
            }

            id(learning_sample_count) += 1;
          };

          capture_target(id(target_1_x).state, id(target_1_y).state, id(target_1_distance).state);
          capture_target(id(target_2_x).state, id(target_2_y).state, id(target_2_distance).state);
          capture_target(id(target_3_x).state, id(target_3_y).state, id(target_3_distance).state);

script:
  - id: ble_mode_disabled
    mode: restart
    then:
      - esp32_ble_tracker.stop_scan:
      - logger.log: "BLE scan disabled"

  - id: ble_mode_passive
    mode: restart
    then:
      - esp32_ble_tracker.stop_scan:
      - esp32_ble_tracker.start_scan:
          continuous: true
      - logger.log: "BLE scan passive (continuous)"

  - id: restore_ble_mode
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ble_scan_mode).current_option() == "Passive";'
          then:
            - script.execute: ble_mode_passive
          else:
            - script.execute: ble_mode_disabled

  - id: start_zone_learning
    mode: restart
    then:
      - lambda: |-
          id(learning_active) = true;
          id(learning_has_samples) = false;
          id(learning_sample_count) = 0;
          id(learning_started_ms) = millis();
          ESP_LOGI("learn", "Started learning for Zone %d", id(learning_zone));

  - id: discard_zone_learning
    mode: restart
    then:
      - lambda: |-
          id(learning_active) = false;
          id(learning_has_samples) = false;
          id(learning_sample_count) = 0;
          ESP_LOGI("learn", "Discarded learned data");

  - id: apply_learned_zone
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(learning_has_samples) && id(learning_sample_count) >= 3;'
          then:
            - lambda: |-
                id(learning_active) = false;
                ESP_LOGI(
                  "learn",
                  "Applying learned bounds Zone %d: x[%.0f, %.0f], y[%.0f, %.0f], samples=%d",
                  id(learning_zone),
                  id(learned_min_x), id(learned_max_x),
                  id(learned_min_y), id(learned_max_y),
                  id(learning_sample_count)
                );
            - if:
                condition:
                  lambda: 'return id(learning_zone) == 1;'
                then:
                  - number.set:
                      id: zone_1_x1
                      value: !lambda |-
                        float v = id(learned_min_x) - id(learning_margin_mm).state;
                        if (v < -6000.0f) v = -6000.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_1_y1
                      value: !lambda |-
                        float v = id(learned_min_y) - id(learning_margin_mm).state;
                        if (v < 0.0f) v = 0.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_1_x2
                      value: !lambda |-
                        float v = id(learned_max_x) + id(learning_margin_mm).state;
                        if (v < -6000.0f) v = -6000.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_1_y2
                      value: !lambda |-
                        float v = id(learned_max_y) + id(learning_margin_mm).state;
                        if (v < 0.0f) v = 0.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
            - if:
                condition:
                  lambda: 'return id(learning_zone) == 2;'
                then:
                  - number.set:
                      id: zone_2_x1
                      value: !lambda |-
                        float v = id(learned_min_x) - id(learning_margin_mm).state;
                        if (v < -6000.0f) v = -6000.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_2_y1
                      value: !lambda |-
                        float v = id(learned_min_y) - id(learning_margin_mm).state;
                        if (v < 0.0f) v = 0.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_2_x2
                      value: !lambda |-
                        float v = id(learned_max_x) + id(learning_margin_mm).state;
                        if (v < -6000.0f) v = -6000.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_2_y2
                      value: !lambda |-
                        float v = id(learned_max_y) + id(learning_margin_mm).state;
                        if (v < 0.0f) v = 0.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
            - if:
                condition:
                  lambda: 'return id(learning_zone) == 3;'
                then:
                  - number.set:
                      id: zone_3_x1
                      value: !lambda |-
                        float v = id(learned_min_x) - id(learning_margin_mm).state;
                        if (v < -6000.0f) v = -6000.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_3_y1
                      value: !lambda |-
                        float v = id(learned_min_y) - id(learning_margin_mm).state;
                        if (v < 0.0f) v = 0.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_3_x2
                      value: !lambda |-
                        float v = id(learned_max_x) + id(learning_margin_mm).state;
                        if (v < -6000.0f) v = -6000.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
                  - number.set:
                      id: zone_3_y2
                      value: !lambda |-
                        float v = id(learned_max_y) + id(learning_margin_mm).state;
                        if (v < 0.0f) v = 0.0f;
                        if (v > 6000.0f) v = 6000.0f;
                        return v;
          else:
            - logger.log:
                level: WARN
                format: "Learning data too small to apply (samples=%d)"
                args: ['id(learning_sample_count)']

select:
  - platform: template
    name: "Bluetooth Scanner Mode"
    id: ble_scan_mode
    icon: "mdi:bluetooth"
    entity_category: config
    optimistic: true
    options:
      - "Disabled"
      - "Passive"
    initial_option: "Disabled"
    restore_value: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "Disabled";'
            then:
              - script.execute: ble_mode_disabled
        - if:
            condition:
              lambda: 'return x == "Passive";'
            then:
              - script.execute: ble_mode_passive

  - platform: template
    name: "Zone Learning Target"
    id: zone_learning_target
    icon: "mdi:vector-square"
    entity_category: config
    optimistic: true
    options:
      - "Zone 1"
      - "Zone 2"
      - "Zone 3"
    initial_option: "Zone 1"
    restore_value: true
    on_value:
      then:
        - lambda: |-
            if (x == "Zone 1") {
              id(learning_zone) = 1;
            } else if (x == "Zone 2") {
              id(learning_zone) = 2;
            } else {
              id(learning_zone) = 3;
            }

number:
  - platform: template
    name: "Learning Duration"
    id: learning_duration_s
    icon: "mdi:timer-outline"
    unit_of_measurement: "s"
    entity_category: config
    optimistic: true
    min_value: 5
    max_value: 60
    step: 1
    initial_value: 15
    restore_value: true

  - platform: template
    name: "Learning Margin"
    id: learning_margin_mm
    icon: "mdi:border-all-variant"
    unit_of_measurement: "mm"
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 1000
    step: 50
    initial_value: 200
    restore_value: true

  - platform: ld2450
    ld2450_id: ld2450_radar
    presence_timeout:
      name: "Presence Timeout"
    zone_1:
      x1:
        id: zone_1_x1
        name: "Zone 1 X1"
      y1:
        id: zone_1_y1
        name: "Zone 1 Y1"
      x2:
        id: zone_1_x2
        name: "Zone 1 X2"
      y2:
        id: zone_1_y2
        name: "Zone 1 Y2"
    zone_2:
      x1:
        id: zone_2_x1
        name: "Zone 2 X1"
      y1:
        id: zone_2_y1
        name: "Zone 2 Y1"
      x2:
        id: zone_2_x2
        name: "Zone 2 X2"
      y2:
        id: zone_2_y2
        name: "Zone 2 Y2"
    zone_3:
      x1:
        id: zone_3_x1
        name: "Zone 3 X1"
      y1:
        id: zone_3_y1
        name: "Zone 3 Y1"
      x2:
        id: zone_3_x2
        name: "Zone 3 X2"
      y2:
        id: zone_3_y2
        name: "Zone 3 Y2"

sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Presence Target Count"
      id: target_count
    still_target_count:
      name: "Still Target Count"
      id: still_target_count
    moving_target_count:
      name: "Moving Target Count"
      id: moving_target_count
    target_1:
      x:
        name: "Target 1 X"
        id: target_1_x
      y:
        name: "Target 1 Y"
        id: target_1_y
      distance:
        name: "Target 1 Distance"
        id: target_1_distance
      speed:
        name: "Target 1 Speed"
        id: target_1_speed
    target_2:
      x:
        name: "Target 2 X"
        id: target_2_x
      y:
        name: "Target 2 Y"
        id: target_2_y
      distance:
        name: "Target 2 Distance"
        id: target_2_distance
      speed:
        name: "Target 2 Speed"
        id: target_2_speed
    target_3:
      x:
        name: "Target 3 X"
        id: target_3_x
      y:
        name: "Target 3 Y"
        id: target_3_y
      distance:
        name: "Target 3 Distance"
        id: target_3_distance
      speed:
        name: "Target 3 Speed"
        id: target_3_speed
    zone_1:
      target_count:
        name: "Zone 1 Target Count"
        id: zone_1_target_count
    zone_2:
      target_count:
        name: "Zone 2 Target Count"
        id: zone_2_target_count
    zone_3:
      target_count:
        name: "Zone 3 Target Count"
        id: zone_3_target_count

  - platform: bh1750
    name: "Light Sensor"
    id: bh1750_sensor
    address: 0x23
    update_interval: 5s

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);

  - platform: uptime
    name: "Uptime"
    icon: "mdi:clock-outline"
    entity_category: diagnostic
    update_interval: 60s

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Presence"
    has_moving_target:
      name: "Moving Target"
    has_still_target:
      name: "Still Target"

  - platform: template
    name: "Zone 1 Presence"
    device_class: occupancy
    lambda: |-
      return !isnan(id(zone_1_target_count).state) && id(zone_1_target_count).state > 0;

  - platform: template
    name: "Zone 2 Presence"
    device_class: occupancy
    lambda: |-
      return !isnan(id(zone_2_target_count).state) && id(zone_2_target_count).state > 0;

  - platform: template
    name: "Zone 3 Presence"
    device_class: occupancy
    lambda: |-
      return !isnan(id(zone_3_target_count).state) && id(zone_3_target_count).state > 0;

  - platform: template
    name: "Zone Learning Running"
    device_class: running
    entity_category: diagnostic
    lambda: |-
      return id(learning_active);

  - platform: status
    name: "Status"
    entity_category: diagnostic

  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at least 4s
        then:
          - button.press: factory_reset_btn

  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
    name: "PIR Sensor"
    id: pir
    filters:
      - delayed_on: 50ms
      - delayed_off: 10s
    device_class: motion

switch:
  - platform: ld2450
    ld2450_id: ld2450_radar
    bluetooth:
      name: "LD2450 Bluetooth"
    multi_target:
      name: "Multi Target Tracking"

text_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    version:
      name: "LD2450 Firmware"
    mac_address:
      name: "LD2450 BT MAC"

  - platform: template
    name: "Active Zone"
    icon: "mdi:map-marker-path"
    update_interval: 1s
    lambda: |-
      const bool z1 = !isnan(id(zone_1_target_count).state) && id(zone_1_target_count).state > 0;
      const bool z2 = !isnan(id(zone_2_target_count).state) && id(zone_2_target_count).state > 0;
      const bool z3 = !isnan(id(zone_3_target_count).state) && id(zone_3_target_count).state > 0;
      const int active = (z1 ? 1 : 0) + (z2 ? 1 : 0) + (z3 ? 1 : 0);
      if (active == 0) {
        return {"none"};
      }
      if (active > 1) {
        return {"multiple"};
      }
      if (z1) {
        return {"zone_1"};
      }
      if (z2) {
        return {"zone_2"};
      }
      return {"zone_3"};

  - platform: template
    name: "Zone Learning Status"
    icon: "mdi:school"
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      if (id(learning_active)) {
        char buffer[48];
        snprintf(buffer, sizeof(buffer), "capturing zone_%d (%d)", id(learning_zone), id(learning_sample_count));
        return {buffer};
      }
      if (id(learning_has_samples)) {
        char buffer[48];
        snprintf(buffer, sizeof(buffer), "ready zone_%d (%d)", id(learning_zone), id(learning_sample_count));
        return {buffer};
      }
      return {"idle"};

  - platform: template
    name: "Zone Learning Bounds"
    icon: "mdi:vector-rectangle"
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      if (!id(learning_has_samples)) {
        return {"n/a"};
      }
      char buffer[96];
      snprintf(
        buffer,
        sizeof(buffer),
        "x:[%.0f,%.0f] y:[%.0f,%.0f]",
        id(learned_min_x), id(learned_max_x),
        id(learned_min_y), id(learned_max_y)
      );
      return {buffer};

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic

button:
  - platform: ld2450
    ld2450_id: ld2450_radar
    factory_reset:
      name: "LD2450 Factory Reset"
      entity_category: config
    restart:
      name: "LD2450 Restart"
      entity_category: config

  - platform: template
    name: "Start Zone Learning"
    icon: "mdi:record-circle-outline"
    entity_category: config
    on_press:
      then:
        - script.execute: start_zone_learning

  - platform: template
    name: "Apply Learned Zone"
    icon: "mdi:check-circle-outline"
    entity_category: config
    on_press:
      then:
        - script.execute: apply_learned_zone

  - platform: template
    name: "Discard Learned Zone"
    icon: "mdi:close-circle-outline"
    entity_category: config
    on_press:
      then:
        - script.execute: discard_zone_learning

  - platform: factory_reset
    name: "Restart with Factory Default Settings"
    id: factory_reset_btn
    entity_category: config

  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: safe_mode
    name: "Safe Mode"
    entity_category: config
