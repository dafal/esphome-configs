substitutions:
  device_name: athom-ps02c3mz-virtual5-16x16
  friendly_name: PS02C3MZ Virtual Zones 5x16x16
  project_name: dafal_esphome-configs.athom_ps02c3mz_virtual5_16x16
  project_version: 1.0.0
  area: ""

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${project_version}
  area: ${area}
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 1s
      - script.execute: restore_ble_mode

esp32:
  board: esp32-c3-devkitm-1
  flash_size: 4MB
  variant: esp32c3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y

preferences:
  flash_write_interval: 5min

globals:
  - id: learning_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: learning_has_samples
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: learning_zone
    type: int
    restore_value: true
    initial_value: '1'
  - id: learning_sample_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: learning_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: learning_last_applied_cells
    type: int
    restore_value: false
    initial_value: '0'
  - id: virtual_zone_presence_1
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: virtual_zone_presence_2
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: virtual_zone_presence_3
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: virtual_zone_presence_4
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: virtual_zone_presence_5
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_masks
    type: std::array<uint32_t, 40>
    restore_value: true
    initial_value: 'std::array<uint32_t, 40>{}'
  - id: learning_hits
    type: std::array<uint16_t, 256>
    restore_value: false
    initial_value: 'std::array<uint16_t, 256>{}'
  - id: room_learning_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: room_learning_has_samples
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: room_learning_sample_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: room_learning_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: room_learned_min_x
    type: float
    restore_value: false
    initial_value: '0'
  - id: room_learned_max_x
    type: float
    restore_value: false
    initial_value: '0'
  - id: room_learned_min_y
    type: float
    restore_value: false
    initial_value: '0'
  - id: room_learned_max_y
    type: float
    restore_value: false
    initial_value: '0'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "esphome"
    password: !secret fallback_password
  on_connect:
    - logger.log: "WiFi connected"
  on_disconnect:
    - logger.log: "WiFi disconnected"

captive_portal:

mdns:
  disabled: false

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 3
  log: true

logger:
  level: DEBUG
  baud_rate: 115200

esp32_ble_tracker:
  id: ble_tracker
  scan_parameters:
    continuous: false
    active: false

bluetooth_proxy:
  active: true

esp32_improv:
  authorizer: none

i2c:
  sda: GPIO18
  scl: GPIO19
  scan: true

uart:
  id: uart_ld2450
  tx_pin: GPIO8
  rx_pin: GPIO5
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

interval:
  - interval: 100ms
    then:
      - lambda: |-
          id(virtual_zone_presence_1) = false;
          id(virtual_zone_presence_2) = false;
          id(virtual_zone_presence_3) = false;
          id(virtual_zone_presence_4) = false;
          id(virtual_zone_presence_5) = false;

          if (id(learning_active)) {
            const uint32_t now = millis();
            const float duration_s = id(learning_duration_s).state;
            if (!isnan(duration_s) && duration_s > 0.0f) {
              const uint32_t duration_ms = static_cast<uint32_t>(duration_s * 1000.0f);
              if (now - id(learning_started_ms) >= duration_ms) {
                id(learning_active) = false;
                ESP_LOGI("vzone", "Learning capture finished with %d samples", id(learning_sample_count));
              }
            }
          }

          if (id(room_learning_active)) {
            const uint32_t now = millis();
            const float duration_s = id(room_learning_duration_s).state;
            if (!isnan(duration_s) && duration_s > 0.0f) {
              const uint32_t duration_ms = static_cast<uint32_t>(duration_s * 1000.0f);
              if (now - id(room_learning_started_ms) >= duration_ms) {
                id(room_learning_active) = false;
                ESP_LOGI("room", "Room bounds learning finished with %d samples", id(room_learning_sample_count));
              }
            }
          }

          auto map_to_cell = [&](float x, float y) -> int {
            const float min_x = id(grid_x_min_mm).state;
            const float max_x = id(grid_x_max_mm).state;
            const float min_y = id(grid_y_min_mm).state;
            const float max_y = id(grid_y_max_mm).state;

            if (isnan(min_x) || isnan(max_x) || isnan(min_y) || isnan(max_y)) {
              return -1;
            }
            if (max_x <= min_x || max_y <= min_y) {
              return -1;
            }
            if (x < min_x || x > max_x || y < min_y || y > max_y) {
              return -1;
            }

            float x_ratio = (x - min_x) / (max_x - min_x);
            float y_ratio = (y - min_y) / (max_y - min_y);
            if (x_ratio < 0.0f) x_ratio = 0.0f;
            if (x_ratio > 1.0f) x_ratio = 1.0f;
            if (y_ratio < 0.0f) y_ratio = 0.0f;
            if (y_ratio > 1.0f) y_ratio = 1.0f;

            int col = static_cast<int>(x_ratio * 16.0f);
            int row = static_cast<int>(y_ratio * 16.0f);
            if (col > 15) col = 15;
            if (row > 15) row = 15;

            return row * 16 + col;
          };

          auto apply_cell = [&](float x, float y, float distance) {
            if (isnan(x) || isnan(y) || isnan(distance) || distance <= 0.0f) {
              return;
            }

            if (id(room_learning_active)) {
              if (x < -6000.0f || x > 6000.0f || y < 0.0f || y > 6000.0f) {
                return;
              }
              if (!id(room_learning_has_samples)) {
                id(room_learned_min_x) = x;
                id(room_learned_max_x) = x;
                id(room_learned_min_y) = y;
                id(room_learned_max_y) = y;
                id(room_learning_has_samples) = true;
              } else {
                if (x < id(room_learned_min_x)) id(room_learned_min_x) = x;
                if (x > id(room_learned_max_x)) id(room_learned_max_x) = x;
                if (y < id(room_learned_min_y)) id(room_learned_min_y) = y;
                if (y > id(room_learned_max_y)) id(room_learned_max_y) = y;
              }
              id(room_learning_sample_count) += 1;
            }

            const int cell = map_to_cell(x, y);
            if (cell < 0 || cell > 255) {
              return;
            }

            const int word = cell / 32;
            const uint32_t bit = 1UL << (cell % 32);

            int expansion = static_cast<int>(id(virtual_zone_expansion).state);
            if (expansion < 0) expansion = 0;
            if (expansion > 2) expansion = 2;

            const int cell_row = cell / 16;
            const int cell_col = cell % 16;

            for (int zone = 0; zone < 5; zone++) {
              const int offset = zone * 8;
              bool zone_match = false;
              for (int dr = -expansion; dr <= expansion && !zone_match; dr++) {
                const int rr = cell_row + dr;
                if (rr < 0 || rr > 15) {
                  continue;
                }
                for (int dc = -expansion; dc <= expansion; dc++) {
                  const int cc = cell_col + dc;
                  if (cc < 0 || cc > 15) {
                    continue;
                  }
                  const int ncell = rr * 16 + cc;
                  const int nword = ncell / 32;
                  const uint32_t nbit = 1UL << (ncell % 32);
                  if ((id(zone_masks)[offset + nword] & nbit) != 0U) {
                    zone_match = true;
                    break;
                  }
                }
              }

              if (!zone_match && (id(zone_masks)[offset + word] & bit) != 0U) {
                zone_match = true;
              }

              if (zone_match) {
                if (zone == 0) id(virtual_zone_presence_1) = true;
                if (zone == 1) id(virtual_zone_presence_2) = true;
                if (zone == 2) id(virtual_zone_presence_3) = true;
                if (zone == 3) id(virtual_zone_presence_4) = true;
                if (zone == 4) id(virtual_zone_presence_5) = true;
              }
            }

            if (id(learning_active)) {
              if (id(learning_hits)[cell] < 65535) {
                id(learning_hits)[cell] += 1;
              }
              id(learning_sample_count) += 1;
              id(learning_has_samples) = true;
            }
          };

          apply_cell(id(target_1_x).state, id(target_1_y).state, id(target_1_distance).state);
          apply_cell(id(target_2_x).state, id(target_2_y).state, id(target_2_distance).state);
          apply_cell(id(target_3_x).state, id(target_3_y).state, id(target_3_distance).state);

          id(vzone_presence_1).publish_state(id(virtual_zone_presence_1));
          id(vzone_presence_2).publish_state(id(virtual_zone_presence_2));
          id(vzone_presence_3).publish_state(id(virtual_zone_presence_3));
          id(vzone_presence_4).publish_state(id(virtual_zone_presence_4));
          id(vzone_presence_5).publish_state(id(virtual_zone_presence_5));

script:
  - id: ble_mode_disabled
    mode: restart
    then:
      - esp32_ble_tracker.stop_scan:
      - logger.log: "BLE scan disabled"

  - id: ble_mode_passive
    mode: restart
    then:
      - esp32_ble_tracker.stop_scan:
      - esp32_ble_tracker.start_scan:
          continuous: true
      - logger.log: "BLE scan passive (continuous)"

  - id: restore_ble_mode
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ble_scan_mode).current_option() == "Passive";'
          then:
            - script.execute: ble_mode_passive
          else:
            - script.execute: ble_mode_disabled

  - id: start_zone_learning
    mode: restart
    then:
      - lambda: |-
          id(room_learning_active) = false;

          for (int i = 0; i < 256; i++) {
            id(learning_hits)[i] = 0;
          }

          const int zone_index = id(learning_zone) - 1;
          const int offset = zone_index * 8;
          for (int i = 0; i < 8; i++) {
            id(zone_masks)[offset + i] = 0;
          }

          id(learning_active) = true;
          id(learning_has_samples) = false;
          id(learning_sample_count) = 0;
          id(learning_last_applied_cells) = 0;
          id(learning_started_ms) = millis();
          ESP_LOGI("vzone", "Started REPLACE learning for Virtual Zone %d", id(learning_zone));

  - id: discard_zone_learning
    mode: restart
    then:
      - lambda: |-
          id(learning_active) = false;
          id(learning_has_samples) = false;
          id(learning_sample_count) = 0;
          for (int i = 0; i < 256; i++) {
            id(learning_hits)[i] = 0;
          }
          ESP_LOGI("vzone", "Discarded learning buffer");

  - id: apply_learned_zone
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(learning_has_samples) &&
                     id(learning_sample_count) >= static_cast<int>(id(learning_min_samples).state);
          then:
            - lambda: |-
                id(learning_active) = false;

                const int zone_index = id(learning_zone) - 1;
                const int offset = zone_index * 8;
                const int threshold = static_cast<int>(id(learning_hit_threshold).state);

                for (int i = 0; i < 8; i++) {
                  id(zone_masks)[offset + i] = 0;
                }

                int active_cells = 0;
                for (int cell = 0; cell < 256; cell++) {
                  if (id(learning_hits)[cell] >= threshold) {
                    const int word = cell / 32;
                    const uint32_t bit = 1UL << (cell % 32);
                    id(zone_masks)[offset + word] |= bit;
                    active_cells += 1;
                  }
                }

                id(learning_last_applied_cells) = active_cells;

                ESP_LOGI(
                  "vzone",
                  "Applied Virtual Zone %d with %d cells (%d samples, threshold=%d)",
                  id(learning_zone),
                  active_cells,
                  id(learning_sample_count),
                  threshold
                );
          else:
            - logger.log:
                level: WARN
                format: "Learning data too small to apply (samples=%d)"
                args: ['id(learning_sample_count)']

  - id: clear_selected_virtual_zone
    mode: restart
    then:
      - lambda: |-
          const int zone_index = id(learning_zone) - 1;
          const int offset = zone_index * 8;
          for (int i = 0; i < 8; i++) {
            id(zone_masks)[offset + i] = 0;
          }
          ESP_LOGI("vzone", "Cleared Virtual Zone %d", id(learning_zone));

  - id: clear_all_virtual_zones
    mode: restart
    then:
      - lambda: |-
          for (int i = 0; i < 40; i++) {
            id(zone_masks)[i] = 0;
          }
          ESP_LOGI("vzone", "Cleared all virtual zones");

  - id: start_room_bounds_learning
    mode: restart
    then:
      - lambda: |-
          id(learning_active) = false;
          id(room_learning_active) = true;
          id(room_learning_has_samples) = false;
          id(room_learning_sample_count) = 0;
          id(room_learning_started_ms) = millis();
          ESP_LOGI("room", "Started room bounds learning");

  - id: discard_room_bounds_learning
    mode: restart
    then:
      - lambda: |-
          id(room_learning_active) = false;
          id(room_learning_has_samples) = false;
          id(room_learning_sample_count) = 0;
          ESP_LOGI("room", "Discarded room bounds learning");

  - id: apply_room_bounds_learning
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(room_learning_has_samples) &&
                     id(room_learning_sample_count) >= static_cast<int>(id(room_learning_min_samples).state);
          then:
            - lambda: |-
                id(room_learning_active) = false;
                ESP_LOGI(
                  "room",
                  "Applying learned room bounds x[%.0f,%.0f] y[%.0f,%.0f] samples=%d",
                  id(room_learned_min_x), id(room_learned_max_x),
                  id(room_learned_min_y), id(room_learned_max_y),
                  id(room_learning_sample_count)
                );
            - number.set:
                id: grid_x_min_mm
                value: !lambda |-
                  float v = id(room_learned_min_x) - id(room_bounds_margin_mm).state;
                  if (v < -6000.0f) v = -6000.0f;
                  if (v > 6000.0f) v = 6000.0f;
                  return v;
            - number.set:
                id: grid_x_max_mm
                value: !lambda |-
                  float v = id(room_learned_max_x) + id(room_bounds_margin_mm).state;
                  if (v < -6000.0f) v = -6000.0f;
                  if (v > 6000.0f) v = 6000.0f;
                  return v;
            - number.set:
                id: grid_y_min_mm
                value: !lambda |-
                  float v = id(room_learned_min_y) - id(room_bounds_margin_mm).state;
                  if (v < 0.0f) v = 0.0f;
                  if (v > 6000.0f) v = 6000.0f;
                  return v;
            - number.set:
                id: grid_y_max_mm
                value: !lambda |-
                  float v = id(room_learned_max_y) + id(room_bounds_margin_mm).state;
                  if (v < 0.0f) v = 0.0f;
                  if (v > 6000.0f) v = 6000.0f;
                  return v;
          else:
            - logger.log:
                level: WARN
                format: "Room learning data too small to apply (samples=%d)"
                args: ['id(room_learning_sample_count)']

select:
  - platform: template
    name: "Bluetooth Scanner Mode"
    id: ble_scan_mode
    icon: "mdi:bluetooth"
    entity_category: config
    optimistic: true
    options:
      - "Disabled"
      - "Passive"
    initial_option: "Disabled"
    restore_value: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "Disabled";'
            then:
              - script.execute: ble_mode_disabled
        - if:
            condition:
              lambda: 'return x == "Passive";'
            then:
              - script.execute: ble_mode_passive

  - platform: template
    name: "Virtual Zone Learning Target"
    id: virtual_zone_learning_target
    icon: "mdi:grid"
    entity_category: config
    optimistic: true
    options:
      - "Zone 1"
      - "Zone 2"
      - "Zone 3"
      - "Zone 4"
      - "Zone 5"
    initial_option: "Zone 1"
    restore_value: true
    on_value:
      then:
        - lambda: |-
            if (x == "Zone 1") id(learning_zone) = 1;
            else if (x == "Zone 2") id(learning_zone) = 2;
            else if (x == "Zone 3") id(learning_zone) = 3;
            else if (x == "Zone 4") id(learning_zone) = 4;
            else id(learning_zone) = 5;

number:
  - platform: template
    name: "Learning Duration"
    id: learning_duration_s
    icon: "mdi:timer-outline"
    unit_of_measurement: "s"
    entity_category: config
    optimistic: true
    min_value: 5
    max_value: 120
    step: 1
    initial_value: 15
    restore_value: true

  - platform: template
    name: "Learning Hit Threshold"
    id: learning_hit_threshold
    icon: "mdi:filter-outline"
    entity_category: config
    optimistic: true
    min_value: 1
    max_value: 20
    step: 1
    initial_value: 2
    restore_value: true

  - platform: template
    name: "Learning Min Samples"
    id: learning_min_samples
    icon: "mdi:counter"
    entity_category: config
    optimistic: true
    min_value: 1
    max_value: 500
    step: 1
    initial_value: 10
    restore_value: true

  - platform: template
    name: "Virtual Zone Expansion"
    id: virtual_zone_expansion
    icon: "mdi:grid-plus"
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 2
    step: 1
    initial_value: 1
    restore_value: true

  - platform: template
    name: "Room Learning Duration"
    id: room_learning_duration_s
    icon: "mdi:timer-outline"
    unit_of_measurement: "s"
    entity_category: config
    optimistic: true
    min_value: 5
    max_value: 120
    step: 1
    initial_value: 30
    restore_value: true

  - platform: template
    name: "Room Bounds Margin"
    id: room_bounds_margin_mm
    icon: "mdi:border-all-variant"
    unit_of_measurement: "mm"
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 1000
    step: 50
    initial_value: 200
    restore_value: true

  - platform: template
    name: "Room Learning Min Samples"
    id: room_learning_min_samples
    icon: "mdi:counter"
    entity_category: config
    optimistic: true
    min_value: 1
    max_value: 1000
    step: 1
    initial_value: 20
    restore_value: true

  - platform: template
    name: "Grid X Min"
    id: grid_x_min_mm
    unit_of_measurement: "mm"
    icon: "mdi:arrow-left-bold"
    entity_category: config
    optimistic: true
    min_value: -6000
    max_value: 6000
    step: 50
    initial_value: -6000
    restore_value: true

  - platform: template
    name: "Grid X Max"
    id: grid_x_max_mm
    unit_of_measurement: "mm"
    icon: "mdi:arrow-right-bold"
    entity_category: config
    optimistic: true
    min_value: -6000
    max_value: 6000
    step: 50
    initial_value: 6000
    restore_value: true

  - platform: template
    name: "Grid Y Min"
    id: grid_y_min_mm
    unit_of_measurement: "mm"
    icon: "mdi:arrow-down-bold"
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 6000
    step: 50
    initial_value: 0
    restore_value: true

  - platform: template
    name: "Grid Y Max"
    id: grid_y_max_mm
    unit_of_measurement: "mm"
    icon: "mdi:arrow-up-bold"
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 6000
    step: 50
    initial_value: 6000
    restore_value: true

  - platform: ld2450
    ld2450_id: ld2450_radar
    presence_timeout:
      name: "Presence Timeout"

sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Presence Target Count"
      id: target_count
    still_target_count:
      name: "Still Target Count"
      id: still_target_count
    moving_target_count:
      name: "Moving Target Count"
      id: moving_target_count
    target_1:
      x:
        name: "Target 1 X"
        id: target_1_x
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      y:
        name: "Target 1 Y"
        id: target_1_y
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      distance:
        name: "Target 1 Distance"
        id: target_1_distance
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      speed:
        name: "Target 1 Speed"
        id: target_1_speed
    target_2:
      x:
        name: "Target 2 X"
        id: target_2_x
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      y:
        name: "Target 2 Y"
        id: target_2_y
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      distance:
        name: "Target 2 Distance"
        id: target_2_distance
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      speed:
        name: "Target 2 Speed"
        id: target_2_speed
    target_3:
      x:
        name: "Target 3 X"
        id: target_3_x
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      y:
        name: "Target 3 Y"
        id: target_3_y
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      distance:
        name: "Target 3 Distance"
        id: target_3_distance
        filters:
          - timeout:
              timeout: 300ms
              value: last
          - throttle_with_priority:
              timeout: 200ms
              value: .nan
      speed:
        name: "Target 3 Speed"
        id: target_3_speed

  - platform: template
    name: "Virtual Zone 1 Active Cells"
    lambda: |-
      int count = 0;
      for (int cell = 0; cell < 256; cell++) {
        const int word = cell / 32;
        const uint32_t bit = 1UL << (cell % 32);
        if ((id(zone_masks)[word] & bit) != 0U) count++;
      }
      return count;
    update_interval: 2s
    entity_category: diagnostic

  - platform: template
    name: "Virtual Zone 2 Active Cells"
