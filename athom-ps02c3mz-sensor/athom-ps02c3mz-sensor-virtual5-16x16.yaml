    name: "Status LED"
    disabled_by_default: true
    restore_mode: ALWAYS_OFF
    pin:
      number: GPIO2
      inverted: false

text_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    version:
      name: "LD2450 Firmware"
    mac_address:
      name: "LD2450 BT MAC"

  - platform: template
    name: "Active Virtual Zone"
    icon: "mdi:grid"
    update_interval: 250ms
    lambda: |-
      const bool z1 = id(virtual_zone_presence_1);
      const bool z2 = id(virtual_zone_presence_2);
      const bool z3 = id(virtual_zone_presence_3);
      const bool z4 = id(virtual_zone_presence_4);
      const bool z5 = id(virtual_zone_presence_5);
      const int active = (z1 ? 1 : 0) + (z2 ? 1 : 0) + (z3 ? 1 : 0) + (z4 ? 1 : 0) + (z5 ? 1 : 0);
      if (active == 0) return {"none"};
      if (active > 1) return {"multiple"};
      if (z1) return {"zone_1"};
      if (z2) return {"zone_2"};
      if (z3) return {"zone_3"};
      if (z4) return {"zone_4"};
      return {"zone_5"};

  - platform: template
    name: "Zone Learning Status"
    icon: "mdi:school"
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      if (id(learning_active)) {
        char buffer[56];
        snprintf(buffer, sizeof(buffer), "capturing zone_%d (%d)", id(learning_zone), id(learning_sample_count));
        return {buffer};
      }
      if (id(learning_has_samples)) {
        char buffer[64];
        snprintf(buffer, sizeof(buffer), "ready zone_%d (%d samples)", id(learning_zone), id(learning_sample_count));
        return {buffer};
      }
      return {"idle"};

  - platform: template
    name: "Zone Learning Apply Result"
    icon: "mdi:checkbox-marked-circle-outline"
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      char buffer[48];
      snprintf(buffer, sizeof(buffer), "zone_%d cells=%d", id(learning_zone), id(learning_last_applied_cells));
      return {buffer};

  - platform: template
    name: "Room Bounds Learning Status"
    icon: "mdi:floor-plan"
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      if (id(room_learning_active)) {
        char buffer[64];
        snprintf(buffer, sizeof(buffer), "capturing room (%d)", id(room_learning_sample_count));
        return {buffer};
      }
      if (id(room_learning_has_samples)) {
        char buffer[64];
        snprintf(buffer, sizeof(buffer), "ready room (%d samples)", id(room_learning_sample_count));
        return {buffer};
      }
      return {"idle"};

  - platform: template
    name: "Learned Room Bounds"
    icon: "mdi:vector-rectangle"
    entity_category: diagnostic
    update_interval: 1s
    lambda: |-
      if (!id(room_learning_has_samples)) {
        return {"n/a"};
      }
      char buffer[96];
      snprintf(
        buffer,
        sizeof(buffer),
        "x:[%.0f,%.0f] y:[%.0f,%.0f]",
        id(room_learned_min_x),
        id(room_learned_max_x),
        id(room_learned_min_y),
        id(room_learned_max_y)
      );
      return {buffer};

  - platform: template
    name: "Virtual Grid Bounds"
    icon: "mdi:vector-rectangle"
    entity_category: diagnostic
    update_interval: 2s
    lambda: |-
      char buffer[96];
      snprintf(
        buffer,
        sizeof(buffer),
        "x:[%.0f,%.0f] y:[%.0f,%.0f] grid:16x16",
        id(grid_x_min_mm).state,
        id(grid_x_max_mm).state,
        id(grid_y_min_mm).state,
        id(grid_y_max_mm).state
      );
      return {buffer};

  - platform: wifi_info
